name: Create Deliverable Sub-Issues

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:

  create-standard-subissues:
    if: |
      github.event.action == 'opened' &&
      contains(github.event.issue.title, '[DELIVERABLE]')
    runs-on: ubuntu-latest

    steps:

      - name: Create SIA Sub-Issue
        id: sia
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const parent = context.payload.issue;

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SIA] ${parent.title.replace('[DELIVERABLE]', '').trim()}`,
              body: `Parent Deliverable: #${parent.number}`,
              labels: ['security-review']
            });

            core.setOutput('issue_number', created.data.number);

      - name: Link SIA as sub-issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const parentIssueNumber = context.payload.issue.number;
            const childIssueNumber = ${{ steps.sia.outputs.issue_number }};

            const query = `
            mutation {
              addSubIssue(input: {
                issueId: "${context.payload.issue.node_id}",
                subIssueId: "${(await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: childIssueNumber
                })).data.node_id}"
              }) {
                issue {
                  id
                }
              }
            }`;

            await github.graphql(query);

      - name: Create TESTING Sub-Issue
        id: testing
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const parent = context.payload.issue;

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[TESTING] ${parent.title.replace('[DELIVERABLE]', '').trim()}`,
              body: `Parent Deliverable: #${parent.number}`,
              labels: ['testing']
            });

            core.setOutput('issue_number', created.data.number);

      - name: Link TESTING as sub-issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const childIssueNumber = ${{ steps.testing.outputs.issue_number }};

            const query = `
            mutation {
              addSubIssue(input: {
                issueId: "${context.payload.issue.node_id}",
                subIssueId: "${(await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: childIssueNumber
                })).data.node_id}"
              }) {
                issue {
                  id
                }
              }
            }`;

            await github.graphql(query);

      - name: Create CLOSURE Sub-Issue
        id: closure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const parent = context.payload.issue;

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CLOSURE] ${parent.title.replace('[DELIVERABLE]', '').trim()}`,
              body: `Parent Deliverable: #${parent.number}`,
              labels: ['closure']
            });

            core.setOutput('issue_number', created.data.number);

      - name: Link CLOSURE as sub-issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const childIssueNumber = ${{ steps.closure.outputs.issue_number }};

            const query = `
            mutation {
              addSubIssue(input: {
                issueId: "${context.payload.issue.node_id}",
                subIssueId: "${(await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: childIssueNumber
                })).data.node_id}"
              }) {
                issue {
                  id
                }
              }
            }`;

            await github.graphql(query);

  create-security-subissue:
    if: |
      github.event.action == 'labeled' &&
      github.event.label.name == 'security-impact'
    runs-on: ubuntu-latest

    steps:

      - name: Create SECURITY Sub-Issue
        id: security
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const parent = context.payload.issue;

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SECURITY] ${parent.title.replace('[DELIVERABLE]', '').trim()}`,
              body: `Security review required for #${parent.number}`,
              labels: ['security-review']
            });

            core.setOutput('issue_number', created.data.number);

      - name: Link SECURITY as sub-issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const childIssueNumber = ${{ steps.security.outputs.issue_number }};

            const query = `
            mutation {
              addSubIssue(input: {
                issueId: "${context.payload.issue.node_id}",
                subIssueId: "${(await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: childIssueNumber
                })).data.node_id}"
              }) {
                issue {
                  id
                }
              }
            }`;

            await github.graphql(query);
