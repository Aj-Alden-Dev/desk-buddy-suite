name: Create Deliverable Sub-Issues

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:

  create-standard-subissues:
    if: |
      github.event.action == 'opened' &&
      contains(github.event.issue.title, '[DELIVERABLE]')
    runs-on: ubuntu-latest

    steps:

      - name: Create Security Impact Assessment Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;

            const body = `
            # Security Impact Assessment

            ## Deliverable
            - Name:
            - Owner:
            - Jira / GitHub Parent Link: #${issue.number}

            ## Change Type
            - [ ] Prod Support
            - [ ] UI Change
            - [ ] Feature Enhancement
            - [ ] Integration
            - [ ] Infrastructure
            - [ ] Migration

            ## Data & Sensitivity
            - User data impacted:
            - Sensitive data involved:
            - Authentication/authorization impact:
            - File uploads/downloads involved:

            ## Systems / Environments Affected
            - [ ] Frontend
            - [ ] Backend API
            - [ ] Database
            - [ ] S3 / Storage
            - [ ] Admin Portal
            - [ ] Third-party Integrations
            - [ ] Xen Integration
            - [ ] CI/CD
            - [ ] Production Infra

            ## Security Impact Identified?
            - [ ] Yes
            - [ ] No

            ## Risks Identified
            -

            ## Required Controls / Approvals
            -

            ## Outcome
            - [ ] Approved for implementation
            - [ ] Requires Security Review
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SIA] ${issue.title.replace('[DELIVERABLE]', '').trim()}`,
              body: body,
              labels: ['security-review']
            });

      - name: Create Testing Validation Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;

            const body = `
            # Testing & Validation

            ## Test Coverage
            - [ ] Unit Testing
            - [ ] Integration Testing
            - [ ] Manual QA
            - [ ] Regression Testing
            - [ ] UAT (if applicable)

            ## Validation Details

            ### Tested Scenarios
            -

            ### Edge Cases
            -

            ### Result
            - [ ] Passed
            - [ ] Failed

            ## Evidence
            - PR Link:
            - Screenshots:
            - Logs:
            - Deployment Verification:

            ## Approval
            - QA Approved By:
            - Date:
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[TESTING] ${issue.title.replace('[DELIVERABLE]', '').trim()}`,
              body: body,
              labels: ['testing']
            });

      - name: Create Closure Sign-off Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;

            const body = `
            # Closure / Sign-off Record

            ## Summary of Work
            -

            ## Deliverables Completed
            - [ ] Risk assessment completed
            - [ ] Security review completed (if required)
            - [ ] Testing passed
            - [ ] Production deployment completed

            ## Residual Risks
            -

            ## Evidence Links
            - Parent Issue: #${issue.number}
            - PRs:
            - Deployments:
            - Jira Tickets:
            - Documentation:

            ## Approval
            - Approved By:
            - Date:
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CLOSURE] ${issue.title.replace('[DELIVERABLE]', '').trim()}`,
              body: body,
              labels: ['closure']
            });

  create-security-checklist:
    if: |
      github.event.action == 'labeled' &&
      github.event.label.name == 'security-impact'
    runs-on: ubuntu-latest

    steps:

      - name: Create Security Requirements Checklist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;

            if (!issue.title.includes('[DELIVERABLE]')) {
              return;
            }

            const body = `
            # Security Requirements Checklist

            ## Authentication & Authorization
            - [ ] Access control reviewed
            - [ ] Role permissions validated
            - [ ] Admin access reviewed

            ## Logging & Monitoring
            - [ ] Logs added/updated
            - [ ] Monitoring impact reviewed

            ## Encryption
            - [ ] Data encrypted in transit
            - [ ] Data encrypted at rest

            ## Secrets Management
            - [ ] No secrets hardcoded
            - [ ] Secrets stored securely

            ## Vulnerability & Code Review
            - [ ] Security review completed
            - [ ] Dependency review completed

            ## Backup / Recovery / Retention
            - [ ] Backup impact reviewed
            - [ ] Retention obligations reviewed

            ## Privacy
            - [ ] PII handling reviewed
            - [ ] Compliance impact reviewed

            ## Outcome
            - [ ] Security requirements satisfied
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SECURITY] ${issue.title.replace('[DELIVERABLE]', '').trim()}`,
              body: body,
              labels: ['security-review']
            });
