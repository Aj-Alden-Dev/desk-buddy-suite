name: Prevent Parent Close
on:
  issues:
    types: [closed]

permissions:
  issues: write
  repository-projects: write

# ── REQUIRED SECRET ──────────────────────────────────────────────────────────
# Add a repo secret named PROJECT_TOKEN:
#   GitHub → Settings → Developer settings → Personal access tokens (classic)
#   → Generate new token → tick "project" scope → copy token
#   Repo → Settings → Secrets and variables → Actions → New secret
#   Name: PROJECT_TOKEN
# ────────────────────────────────────────────────────────────────────────────

jobs:
  validate-parent-close:
    runs-on: ubuntu-latest
    steps:
      - name: Reopen parent and revert project status if sub-issues are open
        uses: actions/github-script@v7
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const parent       = context.payload.issue;
            const owner        = context.repo.owner;
            const repo         = context.repo.repo;
            const projectToken = process.env.PROJECT_TOKEN;

            if (!parent.title.includes('[DELIVERABLE]')&&
            !parent.title.includes('[DEV]') &&
            !parent.title.includes('[UI]') &&
            !parent.title.includes('[PERFORMANCE]') &&
            !parent.title.includes('[TEST]')) return;

            // ── 1. Find open sub-issues ───────────────────────────────────────
            const openChildren = await findOpenSubIssues(parent.number);
            if (openChildren.length === 0) {
              console.log('All sub-issues closed – allowing parent to close.');
              return;
            }
            console.log(`${openChildren.length} open sub-issue(s) found – blocking.`);

            // ── 2. Reopen the issue ───────────────────────────────────────────
            await github.rest.issues.update({
              owner, repo, issue_number: parent.number, state: 'open'
            });

            // ── 3. Revert project status ──────────────────────────────────────
            if (!projectToken) {
              console.log('⚠️  PROJECT_TOKEN not set – skipping project status revert.');
            } else {
              await revertProjectStatus(parent.number, projectToken);
            }

            // ── 4. Post blocking comment ──────────────────────────────────────
            const lines = openChildren.map(i => `- #${i.number} ${i.title}`).join('\n');
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: parent.number,
              body: [
                '⛔ **Cannot close this deliverable.**',
                '',
                'The following sub-issues are still open:',
                '',
                lines,
                '',
                '_Close all sub-issues first, then close this deliverable._'
              ].join('\n')
            });

            // ═════════════════════════════════════════════════════════════════
            // HELPERS
            // ═════════════════════════════════════════════════════════════════

            // Use fetch with an explicit token — avoids github.graphql.defaults()
            // which does NOT reliably override the auth header in github-script.
            async function gql(token, query, variables = {}) {
              const res = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: {
                  'Authorization': `bearer ${token}`,
                  'Content-Type':  'application/json',
                  'X-Github-Next-Global-ID': '1'
                },
                body: JSON.stringify({ query, variables })
              });
              const json = await res.json();
              if (json.errors) {
                const msg = json.errors.map(e => e.message).join('; ');
                throw new Error(`GraphQL error: ${msg}`);
              }
              return json.data;
            }

            async function findOpenSubIssues(issueNumber) {
              const open = [];

              // Strategy A: Sub-Issues API (beta)
              try {
                const { data } = await github.request(
                  'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                  {
                    owner, repo, issue_number: issueNumber,
                    headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                  }
                );
                open.push(...data.filter(i => i.state === 'open'));
                console.log(`Sub-Issues API: ${data.length} linked, ${open.length} open.`);
              } catch (e) {
                console.log('Sub-Issues API unavailable, using fallback:', e.message);
              }

              // Strategy B: paginated title-prefix + body-reference scan
              const known    = new Set(open.map(i => i.number));
              const prefixRe = /^\[(SIA|TESTING|CLOSURE|SECURITY)\]/;
              let page = 1;
              while (true) {
                const { data: batch } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', per_page: 100, page
                });
                for (const i of batch) {
                  if (i.number === issueNumber)             continue;
                  if (known.has(i.number))                  continue;
                  if (!prefixRe.test(i.title))              continue;
                  if (!i.body?.includes(`#${issueNumber}`)) continue;
                  open.push(i);
                  known.add(i.number);
                }
                if (batch.length < 100) break;
                page++;
              }

              return open;
            }

            async function revertProjectStatus(issueNumber, token) {
              // Step 1: query project items linked to this issue (using PAT via fetch)
              let projectItems;
              try {
                const data = await gql(token, `
                  query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $number) {
                        projectItems(first: 10) {
                          nodes {
                            id
                            project { id }
                            fieldValueByName(name: "Status") {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                name
                                field {
                                  ... on ProjectV2SingleSelectField {
                                    id
                                    options { id name }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `, { owner, repo, number: issueNumber });
                projectItems = data.repository.issue.projectItems.nodes;
                console.log(`Found ${projectItems.length} project item(s).`);
              } catch (e) {
                console.log('Failed to query project items:', e.message);
                return;
              }

              for (const item of projectItems) {
                const sv = item.fieldValueByName;
                if (!sv) { console.log('No Status field value on item.'); continue; }

                console.log(`Current status: "${sv.name}"`);
                if (sv.name?.toLowerCase() !== 'done') continue;

                // Find the revert-to option
                const options = sv.field?.options ?? [];
                console.log('Available options:', options.map(o => o.name).join(', '));

                const notDone = options.filter(o => o.name.toLowerCase() !== 'done');
                const target  =
                  notDone.find(o => o.name.toLowerCase() === 'in progress') ||
                  notDone.find(o => ['to do', 'todo'].includes(o.name.toLowerCase())) ||
                  notDone[0];

                if (!target) { console.log('No non-Done option found.'); continue; }
                console.log(`Reverting to: "${target.name}" (${target.id})`);

                // Step 2: mutate using the PAT via fetch
                try {
                  await gql(token, `
                    mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $project
                        itemId:    $item
                        fieldId:   $field
                        value:     { singleSelectOptionId: $option }
                      }) { projectV2Item { id } }
                    }
                  `, {
                    project: item.project.id,
                    item:    item.id,
                    field:   sv.field.id,
                    option:  target.id
                  });
                  console.log(`✅ Status reverted from "Done" to "${target.name}".`);
                } catch (e) {
                  console.log('Mutation failed:', e.message);
                }
              }
            }
