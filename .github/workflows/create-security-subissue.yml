name: Create Security Sub-Issue

on:
  issues:
    types:
      - labeled

permissions:
  issues: write

jobs:
  create-security-subissue:
    if: |
      github.event.label.name == 'security-impact' &&
      contains(github.event.issue.title, '[DELIVERABLE]')
    runs-on: ubuntu-latest

    steps:

      - name: Create SECURITY issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const issue = context.payload.issue;
            const title = issue.title.replace('[DELIVERABLE]', '').trim();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });

            const exists = issues.some(i =>
              i.title === `[SECURITY] ${title}`
            );

            if (!exists) {

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[SECURITY] ${title}`,
                body: `Security review required for #${issue.number}`,
                labels: ['security-review']
              });

              console.log('Created SECURITY');
            }
