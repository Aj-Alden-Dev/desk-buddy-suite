name: Create Security Sub-Issue

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:

  create-security-subissue:
    if: |
      github.event.label.name == 'security-impact' &&
      contains(github.event.issue.title, '[DELIVERABLE]')
    runs-on: ubuntu-latest

    steps:

      - name: Create SECURITY Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const parent = context.payload.issue;
            const title = parent.title.replace('[DELIVERABLE]', '').trim();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all'
            });

            const exists = issues.some(i =>
              i.title === `[SECURITY] ${title}`
            );

            if (exists) {
              console.log('Security issue already exists');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SECURITY] ${title}`,
              body: `Security review required for #${parent.number}`,
              labels: ['security-review']
            });
