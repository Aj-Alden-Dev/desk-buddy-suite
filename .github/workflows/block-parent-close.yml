name: Prevent Parent Close

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  validate-subissues:
    runs-on: ubuntu-latest

    steps:
      - name: Check open child issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const issue = context.payload.issue;

            if (!issue.title.includes('[DELIVERABLE]')) {
              return;
            }

            const searchText = issue.title
              .replace('[DELIVERABLE]', '')
              .trim();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const related = issues.filter(i =>
              i.title.includes(searchText) &&
              (
                i.title.includes('[SIA]') ||
                i.title.includes('[SECURITY]') ||
                i.title.includes('[TESTING]') ||
                i.title.includes('[CLOSURE]')
              )
            );

            if (related.length > 0) {

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'open'
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body:
`Cannot close deliverable.

Open sub-issues still exist:

${related.map(r => `- #${r.number} ${r.title}`).join('\n')}`
              });
            }
