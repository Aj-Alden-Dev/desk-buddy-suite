name: Prevent Parent Completion

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:

  validate-subissues:
    runs-on: ubuntu-latest

    steps:

      - name: Reopen parent if child issues still open
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const parent = context.payload.issue;

            if (!parent.title.includes('[DELIVERABLE]')) {
              return;
            }

            const cleanTitle = parent.title
              .replace('[DELIVERABLE]', '')
              .trim();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const openChildren = issues.filter(issue => {

              if (issue.number === parent.number) {
                return false;
              }

              return (
                issue.title.includes(cleanTitle) &&
                (
                  issue.title.startsWith('[SIA]') ||
                  issue.title.startsWith('[SECURITY]') ||
                  issue.title.startsWith('[TESTING]') ||
                  issue.title.startsWith('[CLOSURE]')
                )
              );
            });

            if (openChildren.length > 0) {

              // reopen issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parent.number,
                state: 'open'
              });

              // comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parent.number,
                body:
`❌ Deliverable cannot be completed.

The following child issues are still open:

${openChildren.map(i =>
`- #${i.number} ${i.title}`
).join('\n')}

Please complete all child issues first.`
              });

              console.log('Parent reopened.');
            }
