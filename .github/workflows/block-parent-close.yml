name: Prevent Parent Close
on:
  issues:
    types: [closed]

permissions:
  issues: write
  repository-projects: write

# ══════════════════════════════════════════════════════════════════════════════
# ONE-TIME SETUP REQUIRED
# ══════════════════════════════════════════════════════════════════════════════
# GITHUB_TOKEN cannot write to user-level projects (@username's project).
# You must create a Personal Access Token (PAT) and add it as a repo secret.
#
# Steps:
#   1. Go to GitHub → Settings → Developer settings → Personal access tokens
#      → Tokens (classic) → Generate new token (classic)
#   2. Tick the "project" scope (grants read/write to Projects v2)
#   3. Copy the token
#   4. Go to your repo → Settings → Secrets and variables → Actions → New secret
#   5. Name: PROJECT_TOKEN   Value: (paste the token)
#
# The workflow uses PROJECT_TOKEN for all project mutations and GITHUB_TOKEN
# for issue operations (reopen, comment). If PROJECT_TOKEN is not set it will
# log a warning but still reopen the issue.
# ══════════════════════════════════════════════════════════════════════════════

jobs:
  validate-parent-close:
    runs-on: ubuntu-latest
    steps:
      - name: Reopen parent and revert project status if sub-issues are open
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const parent       = context.payload.issue;
            const owner        = context.repo.owner;
            const repo         = context.repo.repo;
            // PAT with "project" scope — required for user-level project mutations
            const projectToken = '${{ secrets.PROJECT_TOKEN }}';

            if (!parent.title.includes('[DELIVERABLE]')) return;

            // ── 1. Find open sub-issues ───────────────────────────────────────
            const openChildren = await findOpenSubIssues(parent.number);
            if (openChildren.length === 0) {
              console.log('All sub-issues closed – allowing parent to close.');
              return;
            }
            console.log(`${openChildren.length} open sub-issue(s) blocking close.`);

            // ── 2. Reopen the issue (GITHUB_TOKEN is sufficient for this) ─────
            await github.rest.issues.update({
              owner, repo, issue_number: parent.number, state: 'open'
            });

            // ── 3. Revert the project status using the PAT ───────────────────
            if (!projectToken || projectToken === '') {
              console.log(
                '⚠️  PROJECT_TOKEN secret not set – cannot revert project status.\n' +
                'Create a PAT with the "project" scope and add it as PROJECT_TOKEN.'
              );
            } else {
              await revertProjectStatus(parent.number, projectToken);
            }

            // ── 4. Post blocking comment ──────────────────────────────────────
            const lines = openChildren.map(i => `- #${i.number} ${i.title}`).join('\n');
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: parent.number,
              body: [
                '⛔ **Cannot close this deliverable.**',
                '',
                'The following sub-issues are still open:',
                '',
                lines,
                '',
                '_Close all sub-issues first, then close this deliverable._'
              ].join('\n')
            });

            // ═════════════════════════════════════════════════════════════════
            // HELPERS
            // ═════════════════════════════════════════════════════════════════

            async function findOpenSubIssues(issueNumber) {
              const open = [];

              // Strategy A: Sub-Issues API (beta)
              try {
                const { data } = await github.request(
                  'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                  {
                    owner, repo, issue_number: issueNumber,
                    headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                  }
                );
                open.push(...data.filter(i => i.state === 'open'));
              } catch (e) {
                console.log('Sub-Issues API unavailable, using fallback:', e.message);
              }

              // Strategy B: paginated title-prefix + body-reference scan
              const known    = new Set(open.map(i => i.number));
              const prefixRe = /^\[(SIA|TESTING|CLOSURE|SECURITY)\]/;
              let page = 1;
              while (true) {
                const { data: batch } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', per_page: 100, page
                });
                for (const i of batch) {
                  if (i.number === issueNumber)             continue;
                  if (known.has(i.number))                  continue;
                  if (!prefixRe.test(i.title))              continue;
                  if (!i.body?.includes(`#${issueNumber}`)) continue;
                  open.push(i);
                  known.add(i.number);
                }
                if (batch.length < 100) break;
                page++;
              }

              return open;
            }

            async function revertProjectStatus(issueNumber, token) {
              // Use the PAT for GraphQL so we can write to user-level projects
              const authedGraphql = github.graphql.defaults({
                headers: { authorization: `token ${token}` }
              });

              // Query all project items linked to this issue
              let projectItems;
              try {
                const result = await authedGraphql(`
                  query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $number) {
                        projectItems(first: 10) {
                          nodes {
                            id
                            project { id }
                            fieldValueByName(name: "Status") {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                name
                                field {
                                  ... on ProjectV2SingleSelectField {
                                    id
                                    options { id name }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `, { owner, repo, number: issueNumber });
                projectItems = result.repository.issue.projectItems.nodes;
              } catch (e) {
                console.log('Could not query project items:', e.message);
                return;
              }

              for (const item of projectItems) {
                const statusValue = item.fieldValueByName;
                if (!statusValue) continue;
                if (statusValue.name?.toLowerCase() !== 'done') {
                  console.log(`Status is "${statusValue.name}" – no revert needed.`);
                  continue;
                }

                // Find the revert-to option — handles any casing of TO DO / To Do / todo
                const options = statusValue.field?.options ?? [];
                const notDone = options.filter(o => o.name.toLowerCase() !== 'done');
                const target  =
                  notDone.find(o => o.name.toLowerCase() === 'in progress') ||
                  notDone.find(o => ['to do', 'todo'].includes(o.name.toLowerCase())) ||
                  notDone[0];

                if (!target) {
                  console.log('No non-Done option found to revert to.');
                  continue;
                }

                try {
                  await authedGraphql(`
                    mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $project
                        itemId:    $item
                        fieldId:   $field
                        value:     { singleSelectOptionId: $option }
                      }) { projectV2Item { id } }
                    }
                  `, {
                    project: item.project.id,
                    item:    item.id,
                    field:   statusValue.field.id,
                    option:  target.id
                  });
                  console.log(`✅ Project status reverted from "Done" to "${target.name}".`);
                } catch (e) {
                  console.log('Project status mutation failed:', e.message);
                }
              }
            }
