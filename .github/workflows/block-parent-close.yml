name: Prevent Parent Close

on:
  issues:
    types:
      - closed

permissions:
  issues: write

jobs:

  validate-parent-close:

    runs-on: ubuntu-latest

    steps:

      - name: Reopen parent if child issues are open

        uses: actions/github-script@v7

        with:

          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |

            const parent = context.payload.issue;

            if (!parent.title.includes('[DELIVERABLE]')) {
              return;
            }

            const cleanTitle = parent.title
              .replace('[DELIVERABLE]', '')
              .trim();

            const result = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const openIssues = result.data;

            const childIssues = openIssues.filter(issue => {

              if (issue.number === parent.number) {
                return false;
              }

              const title = issue.title;

              return (
                title.includes(cleanTitle) &&
                (
                  title.startsWith('[SIA]') ||
                  title.startsWith('[TESTING]') ||
                  title.startsWith('[CLOSURE]') ||
                  title.startsWith('[SECURITY]')
                )
              );
            });

            if (childIssues.length > 0) {

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parent.number,
                state: 'open'
              });

              let comment =
                'Cannot close this deliverable.\\n\\n' +
                'Open child issues still exist:\\n\\n';

              for (const issue of childIssues) {

                comment +=
                  '- #' + issue.number + ' ' + issue.title + '\\n';
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parent.number,
                body: comment
              });

              console.log('Parent issue reopened.');
            }
