name: Prevent Parent Close
on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  validate-parent-close:
    runs-on: ubuntu-latest
    steps:
      - name: Reopen parent if sub-issues are still open
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const parent = context.payload.issue;
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;

            if (!parent.title.includes('[DELIVERABLE]')) return;

            // ════════════════════════════════════════════════════════════════
            // ROOT CAUSE FIX (seen in screenshot):
            //
            // The Sub-Issues API (beta) silently failed to link the child issues.
            // Workflow 3 queried it, got an empty array, assumed no children,
            // and allowed the parent to close even though #45/#46/#47 existed.
            //
            // Fix: use TWO detection strategies and take the union of results.
            //   Strategy A — Sub-Issues API        (precise, works if API is available)
            //   Strategy B — title prefix + body   (reliable fallback, works always)
            // ════════════════════════════════════════════════════════════════

            let openChildren = [];

            // ── Strategy A: Sub-Issues API ──
            try {
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                {
                  owner, repo,
                  issue_number: parent.number,
                  headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                }
              );
              const open = data.filter(i => i.state === 'open');
              console.log(`Sub-Issues API: ${data.length} total, ${open.length} open.`);
              openChildren.push(...open);
            } catch (e) {
              console.log('Sub-Issues API unavailable, relying on fallback only:', e.message);
            }

            // ── Strategy B: paginated title-prefix + body-reference scan ──
            // Run this regardless of whether Strategy A succeeded, then deduplicate.
            // A child issue must satisfy BOTH conditions to avoid false-positives:
            //   1. Title starts with [SIA], [TESTING], [CLOSURE], or [SECURITY]
            //   2. Body contains a reference to this parent issue number
            const knownNumbers = new Set(openChildren.map(i => i.number));
            const prefixRe = /^\[(SIA|TESTING|CLOSURE|SECURITY)\]/;
            let page = 1;
            while (true) {
              const { data: batch } = await github.rest.issues.listForRepo({
                owner, repo,
                state:    'open',
                per_page: 100,
                page
              });
              for (const i of batch) {
                if (i.number === parent.number)    continue;
                if (knownNumbers.has(i.number))    continue;
                if (!prefixRe.test(i.title))       continue;
                if (!i.body)                       continue;
                if (!i.body.includes(`#${parent.number}`)) continue;
                openChildren.push(i);
                knownNumbers.add(i.number);
              }
              if (batch.length < 100) break;
              page++;
            }

            console.log(`Total open sub-issues found: ${openChildren.length}`);

            if (openChildren.length === 0) {
              console.log('All sub-issues closed – allowing parent to close.');
              return;
            }

            // ── Reopen the parent ──
            await github.rest.issues.update({
              owner, repo,
              issue_number: parent.number,
              state: 'open'
            });

            // Build the comment (note: single '\n' — was '\\n' bug in original)
            const lines = openChildren
              .map(i => `- #${i.number} ${i.title}`)
              .join('\n');

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: parent.number,
              body: [
                '⛔ **Cannot close this deliverable.**',
                '',
                'The following sub-issues are still open:',
                '',
                lines,
                '',
                '_Close all sub-issues first, then close this deliverable._'
              ].join('\n')
            });

            console.log(`Parent #${parent.number} reopened – ${openChildren.length} open sub-issue(s) blocking.`);

---
# ── BONUS: Block "Done" status in GitHub Projects v2 ────────────────────────
#
# Fires when a project card is moved to "Done" column.
# Uses the same hybrid detection strategy as Workflow 3.
#
# Setup required:
#   Replace the four YOUR_* placeholders with real values from your project.
#   To find them, run this GraphQL query in https://docs.github.com/en/graphql/overview/explorer
#
#   query {
#     user(login: "YOUR_GITHUB_USERNAME") {
#       projectV2(number: YOUR_PROJECT_NUMBER) {
#         id
#         fields(first: 20) {
#           nodes { ... on ProjectV2SingleSelectField { id name options { id name } } }
#         }
#       }
#     }
#   }
#
name: Block Project Done Status
on:
  projects_v2_item:
    types: [edited]

permissions:
  issues: write
  repository-projects: write

jobs:
  block-done-status:
    runs-on: ubuntu-latest
    if: >-
      github.event.changes.field_value.field_name == 'Status' &&
      github.event.changes.field_value.after.name  == 'Done'
    steps:
      - name: Check sub-issues before allowing Done
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const item  = context.payload.projects_v2_item;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Resolve project item → linked issue
            const { node } = await github.graphql(`
              query($id: ID!) {
                node(id: $id) {
                  ... on ProjectV2Item {
                    content { ... on Issue { number title body } }
                  }
                }
              }
            `, { id: item.node_id });

            const linked = node?.content;
            if (!linked?.title?.includes('[DELIVERABLE]')) return;

            // ── Same hybrid detection as Workflow 3 ──
            let openChildren = [];

            try {
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                {
                  owner, repo,
                  issue_number: linked.number,
                  headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                }
              );
              openChildren.push(...data.filter(i => i.state === 'open'));
            } catch (e) {
              console.log('Sub-Issues API unavailable:', e.message);
            }

            const knownNums = new Set(openChildren.map(i => i.number));
            const prefixRe  = /^\[(SIA|TESTING|CLOSURE|SECURITY)\]/;
            let page = 1;
            while (true) {
              const { data: batch } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', per_page: 100, page
              });
              for (const i of batch) {
                if (i.number === linked.number)              continue;
                if (knownNums.has(i.number))                 continue;
                if (!prefixRe.test(i.title))                 continue;
                if (!i.body?.includes(`#${linked.number}`)) continue;
                openChildren.push(i);
                knownNums.add(i.number);
              }
              if (batch.length < 100) break;
              page++;
            }

            if (openChildren.length === 0) return;

            // Revert card to "In Progress"
            try {
              await github.graphql(`
                mutation($p: ID!, $item: ID!, $field: ID!, $opt: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $p, itemId: $item, fieldId: $field,
                    value: { singleSelectOptionId: $opt }
                  }) { projectV2Item { id } }
                }
              `, {
                p:    'YOUR_PROJECT_ID',
                item: item.node_id,
                field:'YOUR_STATUS_FIELD_ID',
                opt:  'YOUR_IN_PROGRESS_OPTION_ID'
              });
            } catch (e) {
              console.log('Could not revert project status:', e.message);
            }

            const lines = openChildren.map(i => `- #${i.number} ${i.title}`).join('\n');
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: linked.number,
              body: [
                '⛔ **Cannot move to Done.**',
                '',
                'The following sub-issues are still open:',
                '',
                lines
              ].join('\n')
            });
