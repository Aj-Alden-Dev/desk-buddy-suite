name: Create Standard Sub-Issues
on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  create-subissues:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, '[DELIVERABLE]')
    steps:
      - name: Create and link child issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const parent     = context.payload.issue;
            const owner      = context.repo.owner;
            const repo       = context.repo.repo;
            const cleanTitle = parent.title.replace('[DELIVERABLE]', '').trim();
            const parentRef  = '#' + parent.number;

            // ── Body templates ────────────────────────────────────────────────
            // Built with array join instead of multiline backtick strings.
            // Multiline template literals with unindented markdown lines (## headings etc.)
            // break YAML literal block scalar parsing — this approach avoids that entirely.

            function siaBody() {
              return [
                '## Security Impact Assessment',
                '**Parent deliverable:** ' + parentRef + ' \u2014 ' + cleanTitle,
                '',
                '### Scope',
                '<!-- Describe impacted systems, data, APIs, and flows -->',
                '',

                '### Data Classification',
                '- [ ] Public',
                '- [ ] Internal',
                '- [ ] Confidential',
                '- [ ] Sensitive / PII',
                '',

                '### Systems Impacted',
                '- [ ] Frontend',
                '- [ ] Backend API',
                '- [ ] Database',
                '- [ ] Authentication',
                '- [ ] Third-party Integrations',
                '',

                '### Security Checklist',
                '- [ ] Authentication reviewed',
                '- [ ] Authorization reviewed',
                '- [ ] Input validation verified',
                '- [ ] Audit logging verified',
                '- [ ] Encryption verified',
                '- [ ] Dependency review completed',
                '- [ ] Secrets handling verified',
                '',

                '### Risk Assessment',
                '| Risk | Severity | Mitigation |',
                '|---|---|---|',
                '| Example risk | Medium | Example mitigation |',
                '',

                '### Residual Risks',
                '<!-- Document accepted or unresolved risks -->',
                '',

                '### Evidence',
                '- Related PR:',
                '- Security Review:',
                '- Scan Results:',
                '',

                '### Sign-off',
                '- [ ] SIA completed',
                '- [ ] Security review approved'
              ].join('\n');
            }



            function testingBody() {
              return [
                '## Testing',
                '**Parent deliverable:** ' + parentRef + ' \u2014 ' + cleanTitle,
                '',
                '### Test Scope',
                '<!-- Describe features, flows, and edge cases tested -->',
                '',

                '### Test Checklist',
                '- [ ] Unit tests passing',
                '- [ ] Integration tests passing',
                '- [ ] Regression tests completed',
                '- [ ] Edge cases validated',
                '- [ ] Accessibility verified (if applicable)',
                '- [ ] Performance impact assessed',
                '',

                '### Test Environments',
                '- [ ] Development',
                '- [ ] Staging',
                '- [ ] Production Smoke Test',
                '',

                '### Findings',
                '| Finding | Severity | Status |',
                '|---|---|---|',
                '| Example finding | Low | Resolved |',
                '',

                '### Evidence',
                '- Test Results:',
                '- Screenshots:',
                '- Automation Report:',
                '- Related PR:',
                '',

                '### Sign-off',
                '- [ ] Testing completed',
                '- [ ] All critical issues resolved',
                '- [ ] QA approved'
              ].join('\n');
            }

            function closureBody() {
              return [
                '## Closure',
                '**Parent deliverable:** ' + parentRef + ' \u2014 ' + cleanTitle,
                '',
                 '### Deployment Checklist',
                '- [ ] Code merged to main',
                '- [ ] Deployment completed',
                '- [ ] Rollback plan verified',
                '- [ ] Monitoring healthy',
                '- [ ] Documentation updated',
                '- [ ] Stakeholders informed',
                '',

                '### Post Deployment Validation',
                '- [ ] Smoke testing completed',
                '- [ ] Error monitoring verified',
                '- [ ] Logs reviewed',
                '',

                '### Follow-up Actions',
                '- Known limitations documented',
                '- Technical debt tracked',
                '- Future enhancements logged',
                '',

                '### Evidence',
                '- Deployment Logs:',
                '- Monitoring Dashboard:',
                '- Release Notes:',
                '- Related PR:',
                '',

                '### Sign-off',
                '- [ ] Closure approved',
                '- [ ] Release completed'
              ].join('\n');
            }


            // ── Check existing sub-issues ─────────────────────────────────────
            let linkedSubIssues = [];
            let subIssuesApiAvailable = false;
            try {
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                {
                  owner, repo, issue_number: parent.number,
                  headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                }
              );
              linkedSubIssues = data;
              subIssuesApiAvailable = true;
            } catch (e) {
              console.log('Sub-Issues API unavailable, using fallback:', e.message);
            }

            let existingPrefixes = new Set();
            if (subIssuesApiAvailable && linkedSubIssues.length > 0) {
              existingPrefixes = new Set(
                linkedSubIssues
                  .map(i => { const m = i.title.match(/^\[([A-Z]+)\]/); return m ? m[1] : null; })
                  .filter(Boolean)
              );
            } else {
              const all = [];
              let page = 1;
              while (true) {
                const { data } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'all', per_page: 100, page
                });
                all.push(...data);
                if (data.length < 100) break;
                page++;
              }
              for (const i of all) {
                const m = i.title.match(/^\[(SIA|TESTING|CLOSURE|SECURITY)\]/);
                if (m && i.body && i.body.includes(parentRef)) existingPrefixes.add(m[1]);
              }
            }

            // ── Create missing sub-issues ─────────────────────────────────────
            async function createAndLink(prefix, label, bodyFn) {
              if (existingPrefixes.has(prefix)) {
                console.log('[' + prefix + '] already exists - skipping.');
                return null;
              }

              const { data: created } = await github.rest.issues.create({
                owner, repo,
                title:  '[' + prefix + '] ' + cleanTitle,
                body:   bodyFn(),
                labels: [label]
              });

              if (subIssuesApiAvailable) {
                try {
                  await github.request(
                    'POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                    {
                      owner, repo,
                      issue_number:     parent.number,
                      sub_issue_number: created.number,
                      headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                    }
                  );
                } catch (e) {
                  console.log('Sub-issue link failed for #' + created.number + ':', e.message);
                }
              }

              return created;
            }

            const sia     = await createAndLink('SIA',     'sia',     siaBody);
            const testing = await createAndLink('TESTING', 'testing', testingBody);
            const closure = await createAndLink('CLOSURE', 'closure', closureBody);

            const created = [sia, testing, closure].filter(Boolean);
            if (created.length > 0) {
              const lines = created.map(i => '- #' + i.number + ' ' + i.title).join('\n');
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: parent.number,
                body: '## Sub-issues created\n' + lines
              });
            }
