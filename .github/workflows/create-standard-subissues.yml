name: Create Standard Sub-Issues
on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  create-subissues:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, '[DELIVERABLE]')
    steps:
      - name: Create and link child issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const parent     = context.payload.issue;
            const owner      = context.repo.owner;
            const repo       = context.repo.repo;
            const cleanTitle = parent.title.replace('[DELIVERABLE]', '').trim();
            const parentRef  = `#${parent.number}`;

            // ── Body templates per sub-issue type ────────────────────────────
            const templates = {
              SIA: `
## Security Impact Assessment
**Parent deliverable:** ${parentRef} — ${cleanTitle}

### Scope
<!-- Briefly describe what is being delivered and what systems/data it touches -->

### Impact checklist
- [ ] Does this change expose new data or APIs?
- [ ] Does this change affect authentication or authorisation?
- [ ] Does this change store, transmit or process personal/sensitive data?
- [ ] Does this change introduce new third-party dependencies?
- [ ] Does this change affect audit logging or monitoring?

### Risk rating
<!-- Low / Medium / High — justify below -->

### Mitigations
<!-- List any controls, guards or follow-up actions -->

### Sign-off
- [ ] SIA reviewed and approved
`.trim(),

              TESTING: `
## Testing
**Parent deliverable:** ${parentRef} — ${cleanTitle}

### Test scope
<!-- What needs to be tested? List features, flows, edge cases -->

### Test checklist
- [ ] Unit tests written and passing
- [ ] Integration tests written and passing
- [ ] Edge cases identified and covered
- [ ] Regression tests run — no new failures
- [ ] Performance impact assessed (if applicable)
- [ ] Accessibility checked (if applicable)

### Test environments
- [ ] Dev
- [ ] Staging
- [ ] Production smoke test

### Sign-off
- [ ] All tests passing
- [ ] Test evidence attached or linked
`.trim(),

              CLOSURE: `
## Closure
**Parent deliverable:** ${parentRef} — ${cleanTitle}

### Closure checklist
- [ ] All sub-issues closed
- [ ] Code merged to main branch
- [ ] Deployment completed successfully
- [ ] Documentation updated
- [ ] Stakeholders notified
- [ ] Monitoring / alerts confirmed healthy post-deploy
- [ ] Any follow-up tickets raised for known future work

### Deployment notes
<!-- Version, deploy date, environment, rollback plan if needed -->

### Sign-off
- [ ] Closure confirmed by team lead
`.trim()
            };

            // ── Helpers ───────────────────────────────────────────────────────
            async function getAllIssues() {
              const issues = [];
              let page = 1;
              while (true) {
                const { data } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'all', per_page: 100, page
                });
                issues.push(...data);
                if (data.length < 100) break;
                page++;
              }
              return issues;
            }

            // ── Check existing sub-issues ─────────────────────────────────────
            let linkedSubIssues = [];
            let subIssuesApiAvailable = false;
            try {
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                {
                  owner, repo, issue_number: parent.number,
                  headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                }
              );
              linkedSubIssues = data;
              subIssuesApiAvailable = true;
            } catch (e) {
              console.log('Sub-Issues API unavailable, using fallback:', e.message);
            }

            let existingPrefixes = new Set();
            if (subIssuesApiAvailable && linkedSubIssues.length > 0) {
              existingPrefixes = new Set(
                linkedSubIssues
                  .map(i => { const m = i.title.match(/^\[([A-Z]+)\]/); return m ? m[1] : null; })
                  .filter(Boolean)
              );
            } else {
              const all = await getAllIssues();
              for (const i of all) {
                const m = i.title.match(/^\[(SIA|TESTING|CLOSURE|SECURITY)\]/);
                if (m && i.body?.includes(parentRef)) existingPrefixes.add(m[1]);
              }
            }

            // ── Create missing sub-issues ─────────────────────────────────────
            async function createAndLink(prefix, label) {
              if (existingPrefixes.has(prefix)) {
                console.log(`[${prefix}] already exists – skipping.`);
                return null;
              }

              const { data: created } = await github.rest.issues.create({
                owner, repo,
                title:  `[${prefix}] ${cleanTitle}`,
                body:   templates[prefix],
                labels: [label]
              });

              if (subIssuesApiAvailable) {
                try {
                  await github.request(
                    'POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                    {
                      owner, repo,
                      issue_number:     parent.number,
                      sub_issue_number: created.number,
                      headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                    }
                  );
                } catch (e) {
                  console.log(`Sub-issue link failed for #${created.number}:`, e.message);
                }
              }

              return created;
            }

            const sia     = await createAndLink('SIA',     'sia');
            const testing = await createAndLink('TESTING', 'testing');
            const closure = await createAndLink('CLOSURE', 'closure');

            const created = [sia, testing, closure].filter(Boolean);
            if (created.length > 0) {
              const lines = created.map(i => `- #${i.number} ${i.title}`).join('\n');
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: parent.number,
                body: `## Sub-issues created\n${lines}`
              });
            }
