name: Create Standard Sub-Issues

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  create-subissues:
    runs-on: ubuntu-latest

    if: contains(github.event.issue.title, '[DELIVERABLE]')

    steps:

      - name: Create standard child issues
        uses: actions/github-script@v7

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |

            const parent = context.payload.issue;

            const cleanTitle = parent.title
              .replace('[DELIVERABLE]', '')
              .trim();

            async function createIssue(prefix, label) {

              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                per_page: 100
              });

              const exists = issues.some(issue =>
                issue.title === `${prefix} ${cleanTitle}`
              );

              if (exists) {
                console.log(`${prefix} already exists`);
                return;
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${prefix} ${cleanTitle}`,
                body: `Parent Deliverable: #${parent.number}`,
                labels: [label]
              });

              console.log(`Created ${prefix}`);
            }

            await createIssue('[SIA]', 'security-review');

            await createIssue('[TESTING]', 'testing');

            await createIssue('[CLOSURE]', 'closure');
