name: Create Standard Sub-Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  create-subissues:
    runs-on: ubuntu-latest

    # Only run for deliverable issues
    if: contains(github.event.issue.title, '[DELIVERABLE]')

    steps:
      - name: Create standard sub-issues
        uses: actions/github-script@v7

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const parent = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const cleanTitle = parent.title
              .replace('[DELIVERABLE]', '')
              .trim();

            const parentRef = `#${parent.number}`;

            // ============================================================
            // ISSUE BODY TEMPLATES
            // ============================================================

            function siaBody() {
              return [
                '## Security Impact Assessment',
                '',
                `**Parent Deliverable:** ${parentRef} — ${cleanTitle}`,
                '',

                '### Scope',
                '<!-- Describe impacted systems, data, APIs, and flows -->',
                '',

                '### Data Classification',
                '- [ ] Public',
                '- [ ] Internal',
                '- [ ] Confidential',
                '- [ ] Sensitive / PII',
                '',

                '### Systems Impacted',
                '- [ ] Frontend',
                '- [ ] Backend API',
                '- [ ] Database',
                '- [ ] Authentication',
                '- [ ] Third-party Integrations',
                '',

                '### Security Checklist',
                '- [ ] Authentication reviewed',
                '- [ ] Authorization reviewed',
                '- [ ] Input validation verified',
                '- [ ] Audit logging verified',
                '- [ ] Encryption verified',
                '- [ ] Dependency review completed',
                '- [ ] Secrets handling verified',
                '',

                '### Risk Assessment',
                '| Risk | Severity | Mitigation |',
                '|---|---|---|',
                '| Example risk | Medium | Example mitigation |',
                '',

                '### Residual Risks',
                '<!-- Document accepted or unresolved risks -->',
                '',

                '### Evidence',
                '- Related PR:',
                '- Security Review:',
                '- Scan Results:',
                '',

                '### Sign-off',
                '- [ ] SIA completed',
                '- [ ] Security review approved'
              ].join('\n');
            }

            function testingBody() {
              return [
                '## Testing',
                '',
                `**Parent Deliverable:** ${parentRef} — ${cleanTitle}`,
                '',

                '### Test Scope',
                '<!-- Describe features, flows, and edge cases tested -->',
                '',

                '### Test Checklist',
                '- [ ] Unit tests passing',
                '- [ ] Integration tests passing',
                '- [ ] Regression tests completed',
                '- [ ] Edge cases validated',
                '- [ ] Accessibility verified (if applicable)',
                '- [ ] Performance impact assessed',
                '',

                '### Test Environments',
                '- [ ] Development',
                '- [ ] Staging',
                '- [ ] Production Smoke Test',
                '',

                '### Findings',
                '| Finding | Severity | Status |',
                '|---|---|---|',
                '| Example finding | Low | Resolved |',
                '',

                '### Evidence',
                '- Test Results:',
                '- Screenshots:',
                '- Automation Report:',
                '- Related PR:',
                '',

                '### Sign-off',
                '- [ ] Testing completed',
                '- [ ] All critical issues resolved',
                '- [ ] QA approved'
              ].join('\n');
            }

            function closureBody() {
              return [
                '## Closure',
                '',
                `**Parent Deliverable:** ${parentRef} — ${cleanTitle}`,
                '',

                '### Deployment Checklist',
                '- [ ] Code merged to main',
                '- [ ] Deployment completed',
                '- [ ] Rollback plan verified',
                '- [ ] Monitoring healthy',
                '- [ ] Documentation updated',
                '- [ ] Stakeholders informed',
                '',

                '### Post Deployment Validation',
                '- [ ] Smoke testing completed',
                '- [ ] Error monitoring verified',
                '- [ ] Logs reviewed',
                '',

                '### Follow-up Actions',
                '- Known limitations documented',
                '- Technical debt tracked',
                '- Future enhancements logged',
                '',

                '### Evidence',
                '- Deployment Logs:',
                '- Monitoring Dashboard:',
                '- Release Notes:',
                '- Related PR:',
                '',

                '### Sign-off',
                '- [ ] Closure approved',
                '- [ ] Release completed'
              ].join('\n');
            }

            // ============================================================
            // ISSUE CONFIGURATION
            // ============================================================

            const issueConfigs = [
              {
                prefix: 'SIA',
                label: 'sia',
                bodyFn: siaBody
              },
              {
                prefix: 'TESTING',
                label: 'testing',
                bodyFn: testingBody
              },
              {
                prefix: 'CLOSURE',
                label: 'closure',
                bodyFn: closureBody
              }
            ];

            // ============================================================
            // FIND EXISTING ISSUES
            // ============================================================

            const existingIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                state: 'all',
                per_page: 100
              }
            );

            const existingPrefixes = new Set();

            for (const issue of existingIssues) {

              if (!issue.body) continue;

              // Must belong to this parent issue
              if (!issue.body.includes(parentRef)) continue;

              const match = issue.title.match(/^\\[(.*?)\\]/);

              if (match) {
                existingPrefixes.add(match[1]);
              }
            }

            // ============================================================
            // CREATE MISSING ISSUES
            // ============================================================

            const createdIssues = [];

            for (const config of issueConfigs) {

              if (existingPrefixes.has(config.prefix)) {
                console.log(`[${config.prefix}] already exists`);
                continue;
              }

              const created = await github.rest.issues.create({
                owner,
                repo,
                title: `[${config.prefix}] ${cleanTitle}`,
                body: config.bodyFn(),
                labels: [config.label]
              });

              createdIssues.push(created.data);

              console.log(`Created issue #${created.data.number}`);
            }

            // ============================================================
            // COMMENT ON PARENT ISSUE
            // ============================================================

            if (createdIssues.length > 0) {

              const issueList = createdIssues
                .map(issue => `- #${issue.number} ${issue.title}`)
                .join('\n');

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: parent.number,
                body:
               `## Sub-Issues Created

                ${issueList}

### Tracking Checklist
- [ ] SIA
- [ ] TESTING
- [ ] CLOSURE
`
              });

              console.log('Parent issue updated successfully');
            }
            else {

              console.log('No new sub-issues required');
            }
