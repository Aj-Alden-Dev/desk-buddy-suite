name: Create Standard Sub-Issues

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write

jobs:
  create-subissues:
    if: contains(github.event.issue.title, '[DELIVERABLE]')
    runs-on: ubuntu-latest

    steps:

      - name: Create SIA issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const issue = context.payload.issue;
            const title = issue.title.replace('[DELIVERABLE]', '').trim();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });

            const exists = issues.some(i =>
              i.title === `[SIA] ${title}`
            );

            if (!exists) {

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[SIA] ${title}`,
                body: `Parent Deliverable: #${issue.number}`,
                labels: ['security-review']
              });

              console.log('Created SIA');
            }

      - name: Create TESTING issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const issue = context.payload.issue;
