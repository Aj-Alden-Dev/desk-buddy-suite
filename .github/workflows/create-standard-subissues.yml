              state: 'all',
              per_page: 100
            });

            const exists = issues.some(i =>
              i.title === `[TESTING] ${title}`
            );

            if (!exists) {

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[TESTING] ${title}`,
                body: `Parent Deliverable: #${issue.number}`,
                labels: ['testing']
              });

              console.log('Created TESTING');
            }

      - name: Create CLOSURE issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const issue = context.payload.issue;
            const title = issue.title.replace('[DELIVERABLE]', '').trim();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });

            const exists = issues.some(i =>
              i.title === `[CLOSURE] ${title}`
            );

            if (!exists) {

              await github.rest.issues.create({
                owner: context.repo.owner,
