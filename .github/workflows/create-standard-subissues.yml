name: Create Standard Sub-Issues
on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  create-subissues:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, '[DELIVERABLE]')
    steps:
      - name: Create and link child issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const parent     = context.payload.issue;
            const owner      = context.repo.owner;
            const repo       = context.repo.repo;
            const cleanTitle = parent.title.replace('[DELIVERABLE]', '').trim();
            const parentRef  = '#' + parent.number;

            // ── Body templates ────────────────────────────────────────────────
            // Built with array join instead of multiline backtick strings.
            // Multiline template literals with unindented markdown lines (## headings etc.)
            // break YAML literal block scalar parsing — this approach avoids that entirely.

            function siaBody() {
              return [
                '## Security Impact Assessment',
                '**Parent deliverable:** ' + parentRef + ' — ' + cleanTitle,
                '',
                '### Ownership',
                '- **Feature Owner:** ',
                '- **Engineering Owner:** ',
                '- **Security Reviewer:** ',
                '- **QA Owner:** ',
                '',
                '### Scope',
                '<!-- Briefly describe what is being delivered and what systems/data it touches -->',
                '',
                '### Data Classification',
                '- [ ] Public',
                '- [ ] Internal',
                '- [ ] Confidential',
                '- [ ] Sensitive / PII',
                '',
                '### Data Types Involved',
                '- User profile data',
                '- Authentication data',
                '- Assessment results',
                '- Uploaded files',
                '- API payloads',
                '',
                '### Systems Affected',
                '- Frontend',
                '- Backend API',
                '- Database',
                '- Authentication Service',
                '- Third-party integrations',
                '',
                '### Environments Affected',
                '- [ ] Development',
                '- [ ] Staging',
'- [ ] Production',
'',
'### External Dependencies',
'- OpenAI API',
'- AWS Services',
'- GitHub Actions',
'- Authentication Provider',
'',
'### Supplier Risk Notes',
'<!-- Mention whether any new vendors/services are introduced -->',
'',
'### Impact checklist',
'- [ ] Does this change expose new data or APIs?',
'- [ ] Does this change affect authentication or authorisation?',
'- [ ] Does this change store, transmit or process personal/sensitive data?',
'- [ ] Does this change introduce new third-party dependencies?',
'- [ ] Does this change affect audit logging or monitoring?',
'',
'### Identified Risks',
'| Risk | Severity | Mitigation |',
'|---|---|---|',
'| Unauthorized API access | Medium | JWT validation |',
'| Sensitive data exposure | High | Access restrictions |',
'| Missing audit logs | Medium | Logging added |',
'',
'### Risk rating',
'- [ ] Low',
'- [ ] Medium',
'- [ ] High',
'- [ ] Critical',
'',
'### Required Security Controls',
'- [ ] Authentication review completed',
'- [ ] Authorization review completed',
'- [ ] Audit logging verified',
'- [ ] Encryption in transit verified',
'- [ ] Encryption at rest verified',
'- [ ] Dependency scan completed',
'- [ ] Code review completed',
'- [ ] Vulnerability assessment completed',
'- [ ] Penetration testing required',
'',
'### Mitigations',
'<!-- List any controls, guards or follow-up actions -->',
'',
'### Residual Risks',
'<!-- Document any accepted or unresolved risks -->',
'',
'### Evidence Links',
'- Parent Issue: ' + parentRef,
'- Related PR: ',
'- Test Evidence: ',
'',
'### Approvals',
'| Role | Name | Status |',
'|---|---|---|',
'| Engineering |  | Pending |',
'| QA |  | Pending |',
'| Security |  | Pending |',
'',
'### Sign-off',
'- [ ] SIA reviewed and approved',
              ].join('\n');
            }

            function testingBody() {
              return [
                '## Testing',
'**Parent deliverable:** ' + parentRef + ' — ' + cleanTitle,
'',
'### Test scope',
'<!-- Describe what is being tested and impacted areas -->',
'',
'### Requirements Covered',
'- Functional requirements reviewed',
'- Security requirements reviewed',
'- Acceptance criteria validated',
'- Linked parent deliverable reviewed',
'',
'### Test checklist',
'- [ ] Unit tests written and passing',
'- [ ] Integration tests written and passing',
'- [ ] Edge cases identified and covered',
'- [ ] Regression tests run — no new failures',
'- [ ] Performance impact assessed (if applicable)',
'- [ ] Accessibility checked (if applicable)',
'',
'### Test environments',
'- [ ] Dev',
'- [ ] Staging',
'- [ ] Production smoke test',
'',
'### Related Backlog Items',
'- Bug fixes:',
'- Security findings:',
'- Follow-up tasks:',
'- Linked GitHub Issues:',
'',
'### Test Findings',
'| # | Finding | Severity | Status | Owner |',
'|---|---|---|---|---|',
'',
'### Risk Resolution',
'- [ ] All critical findings resolved',
'- [ ] Medium risks reviewed and accepted',
'- [ ] Residual risks documented',
'',
'### Evidence Links',
'- Test Run Results:',
'- Automation Report:',
'- Regression Evidence:',
'- Related Pull Request:',
'- Release Build:',
'',
'### Approval Details',
'| Role | Name | Status |',
'|---|---|---|',
'| QA Lead |  | Pending |',
'| Engineering Lead |  | Pending |',
'| Product Owner |  | Pending |',
'',
'### Sign-off',
'- [ ] All tests passing',
'- [ ] Test evidence attached or linked',
'- [ ] Testing completed and approved',
              ].join('\n');
            }

            function closureBody() {
              return [
               '## Closure',
'**Parent deliverable:** ' + parentRef + ' — ' + cleanTitle,
'',
'### Closure summary',
'<!-- Summarise the release/deployment outcome and completion status -->',
'',
'### Closure checklist',
'- [ ] All sub-issues closed',
'- [ ] Code merged to main branch',
'- [ ] Deployment completed successfully',
'- [ ] Rollback plan verified',
'- [ ] Post-deployment validation completed',
'- [ ] Documentation updated',
'- [ ] Stakeholders notified',
'- [ ] Monitoring / alerts confirmed healthy post-deploy',
'- [ ] Any follow-up tickets raised for known future work',
'',
'### Implemented Controls Summary',
'- Authentication controls verified',
'- Logging and monitoring enabled',
'- Dependency vulnerability scan completed',
'- Regression testing completed',
'- Security review completed',
'',
'### Residual Risks',
'- [ ] No known residual risks',
'- [ ] Accepted residual risks documented',
'- [ ] Follow-up work tracked in backlog',
'',
'### Follow-up Actions',
'- Known limitations documented',
'- Future improvements tracked',
'- Technical debt backlog updated',
'',
'### Deployment notes',
'<!-- Add deployment observations, rollback notes, incidents, or operational comments -->',
'',
'### Evidence Links',
'- Parent Deliverable:',
'- Related Pull Request:',
'- Test Evidence:',
'- Security Review:',
'- Deployment Logs:',
'- Monitoring Dashboard:',
'',
'### Approval Details',
'| Role | Name | Date | Status |',
'|---|---|---|---|',
'| Engineering Lead |  |  | Pending |',
'| QA Lead |  |  | Pending |',
'| Product Owner |  |  | Pending |',
'| Security Reviewer |  |  | Pending |',
'',
'### Sign-off',
'- [ ] Closure confirmed by team lead',
'- [ ] Release formally approved',
              ].join('\n');
            }

            // ── Check existing sub-issues ─────────────────────────────────────
            let linkedSubIssues = [];
            let subIssuesApiAvailable = false;
            try {
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                {
                  owner, repo, issue_number: parent.number,
                  headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                }
              );
              linkedSubIssues = data;
              subIssuesApiAvailable = true;
            } catch (e) {
              console.log('Sub-Issues API unavailable, using fallback:', e.message);
            }

            let existingPrefixes = new Set();
            if (subIssuesApiAvailable && linkedSubIssues.length > 0) {
              existingPrefixes = new Set(
                linkedSubIssues
                  .map(i => { const m = i.title.match(/^\[([A-Z]+)\]/); return m ? m[1] : null; })
                  .filter(Boolean)
              );
            } else {
              const all = [];
              let page = 1;
              while (true) {
                const { data } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'all', per_page: 100, page
                });
                all.push(...data);
                if (data.length < 100) break;
                page++;
              }
              for (const i of all) {
                const m = i.title.match(/^\[(SIA|TESTING|CLOSURE|SECURITY)\]/);
                if (m && i.body && i.body.includes(parentRef)) existingPrefixes.add(m[1]);
              }
            }

            // ── Create missing sub-issues ─────────────────────────────────────
            async function createAndLink(prefix, label, bodyFn) {
              if (existingPrefixes.has(prefix)) {
                console.log('[' + prefix + '] already exists - skipping.');
                return null;
              }

              const { data: created } = await github.rest.issues.create({
                owner, repo,
                title:  '[' + prefix + '] ' + cleanTitle,
                body:   bodyFn(),
                labels: [label]
              });

              if (subIssuesApiAvailable) {
                try {
                  await github.request(
                    'POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                    {
                      owner, repo,
                      issue_number:     parent.number,
                      sub_issue_number: created.number,
                      headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                    }
                  );
                } catch (e) {
                  console.log('Sub-issue link failed for #' + created.number + ':', e.message);
                }
              }

              return created;
            }

            const sia     = await createAndLink('SIA',     'sia',     siaBody);
            const testing = await createAndLink('TESTING', 'testing', testingBody);
            const closure = await createAndLink('CLOSURE', 'closure', closureBody);

            const created = [sia, testing, closure].filter(Boolean);
            if (created.length > 0) {
              const lines = created.map(i => '- #' + i.number + ' ' + i.title).join('\n');
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: parent.number,
                body: '## Sub-issues created\n' + lines
              });
            }
