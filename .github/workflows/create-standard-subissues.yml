name: Create Standard Sub-Issues

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:

  create-standard-subissues:
    if: contains(github.event.issue.title, '[DELIVERABLE]')
    runs-on: ubuntu-latest

    steps:

      - name: Create child issues safely
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const parent = context.payload.issue;

            const cleanTitle = parent.title
              .replace('[DELIVERABLE]', '')
              .trim();

            // Get all issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });

            async function ensureIssue(prefix, label) {

              const existing = issues.find(issue =>
                issue.title === `${prefix} ${cleanTitle}`
              );

              if (existing) {
                console.log(`${prefix} already exists`);
                return existing;
              }

              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${prefix} ${cleanTitle}`,
                body:
`Parent Deliverable: #${parent.number}

This issue was auto-created.`,
                labels: [label]
              });

              console.log(`Created ${prefix}`);

              return created.data;
            }

            const sia = await ensureIssue('[SIA]', 'security-review');
            const testing = await ensureIssue('[TESTING]', 'testing');
            const closure = await ensureIssue('[CLOSURE]', 'closure');

            // Add relationship comments safely
            async function addRelationship(child) {

              try {

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parent.number,
                  body:
`Child Issue Linked:
- #${child.number} ${child.title}`
                });

              } catch (err) {

                console.log(err.message);
              }
            }

            await addRelationship(sia);
            await addRelationship(testing);
            await addRelationship(closure);
