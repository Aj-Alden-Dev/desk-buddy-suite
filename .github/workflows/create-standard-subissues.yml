name: Create Standard Sub-Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  create-subissues:
    runs-on: ubuntu-latest

    if: contains(github.event.issue.title, '[DELIVERABLE]')

    steps:

      - name: Create and link child issues
        uses: actions/github-script@v7

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |

            const parent = context.payload.issue;

            const cleanTitle = parent.title
              .replace('[DELIVERABLE]', '')
              .trim();

            async function createIssue(prefix, label) {

              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${prefix} ${cleanTitle}`,
                body:
`Parent Deliverable: #${parent.number}`,
                labels: [label]
              });

              return created.data;
            }

            const sia = await createIssue('[SIA]', 'security-review');

            const testing = await createIssue('[TESTING]', 'testing');

            const closure = await createIssue('[CLOSURE]', 'closure');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parent.number,
              body:
`## Child Issues

- #${sia.number} ${sia.title}
- #${testing.number} ${testing.title}
- #${closure.number} ${closure.title}`
            });
