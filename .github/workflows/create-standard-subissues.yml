name: Create Standard Sub-Issues
on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  create-subissues:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, '[DELIVERABLE]')
    steps:
      - name: Create and link child issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const parent     = context.payload.issue;
            const owner      = context.repo.owner;
            const repo       = context.repo.repo;
            const cleanTitle = parent.title.replace('[DELIVERABLE]', '').trim();

            // ── Helper: paginate all repo issues (fallback dedup check) ──
            async function getAllIssues() {
              const issues = [];
              let page = 1;
              while (true) {
                const { data } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'all', per_page: 100, page
                });
                issues.push(...data);
                if (data.length < 100) break;
                page++;
              }
              return issues;
            }

            // ── Step 1: try the Sub-Issues API (beta — may not be available on all accounts) ──
            let linkedSubIssues = [];
            let subIssuesApiAvailable = false;
            try {
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                {
                  owner, repo,
                  issue_number: parent.number,
                  headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                }
              );
              linkedSubIssues = data;
              subIssuesApiAvailable = true;
              console.log(`Sub-Issues API OK. Found ${data.length} linked sub-issue(s).`);
            } catch (e) {
              console.log('Sub-Issues API unavailable, will use title/body fallback:', e.message);
            }

            // ── Step 2: build set of prefixes that already exist ──
            let existingPrefixes = new Set();

            if (subIssuesApiAvailable && linkedSubIssues.length > 0) {
              existingPrefixes = new Set(
                linkedSubIssues
                  .map(i => { const m = i.title.match(/^\[([A-Z]+)\]/); return m ? m[1] : null; })
                  .filter(Boolean)
              );
            } else {
              // Fallback: match issues that (a) have a known prefix AND
              // (b) reference this parent issue number in their body.
              // Both conditions together prevent false-positives from unrelated issues.
              const all = await getAllIssues();
              for (const i of all) {
                const prefixMatch = i.title.match(/^\[(SIA|TESTING|CLOSURE|SECURITY)\]/);
                const hasBodyRef  = i.body && i.body.includes(`#${parent.number}`);
                if (prefixMatch && hasBodyRef) {
                  existingPrefixes.add(prefixMatch[1]);
                }
              }
              console.log(`Fallback found: [${[...existingPrefixes].join(', ') || 'none'}]`);
            }

            // ── Step 3: create missing sub-issues and attempt to link them ──
            async function createAndLink(prefix, label) {
              if (existingPrefixes.has(prefix)) {
                console.log(`[${prefix}] already exists – skipping.`);
                return null;
              }

              const { data: created } = await github.rest.issues.create({
                owner, repo,
                title: `[${prefix}] ${cleanTitle}`,
                // The body MUST include the parent reference — the fallback scan relies on it
                body:  `Parent deliverable: #${parent.number}`,
                labels: [label]
              });

              if (subIssuesApiAvailable) {
                try {
                  await github.request(
                    'POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                    {
                      owner, repo,
                      issue_number:     parent.number,
                      sub_issue_number: created.number,
                      headers: { 'X-GitHub-Api-Version': '2022-11-28' }
                    }
                  );
                  console.log(`Linked #${created.number} via Sub-Issues API.`);
                } catch (e) {
                  console.log(`Link failed for #${created.number} (issue still created):`, e.message);
                }
              }

              return created;
            }

            const sia     = await createAndLink('SIA',     'sia');
            const testing = await createAndLink('TESTING', 'testing');
            const closure = await createAndLink('CLOSURE', 'closure');

            const created = [sia, testing, closure].filter(Boolean);
            if (created.length > 0) {
              const lines = created.map(i => `- #${i.number} ${i.title}`).join('\n');
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: parent.number,
                body: `## Sub-issues created\n${lines}`
              });
            }
